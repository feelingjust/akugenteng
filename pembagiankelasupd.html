<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembagian Kelas 2025</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ff9f;
      overflow-x: hidden;
    }

    /* Background Matrix Animasi */
    .matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      background: black;
      overflow: hidden;
    }

    .matrix span {
      position: absolute;
      color: #00ff9f55;
      user-select: none;
      animation: fall linear infinite;
      font-size: 16px;
    }

    @keyframes fall {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    /* Glow Text */
    .glow {
      text-shadow: 0 0 8px #00ff9f, 0 0 16px #00ff9f;
    }

    /* Card hacker */
    .hack-card {
      background: rgba(0, 20, 0, 0.6);
      border: 1px solid #00ff9f55;
      backdrop-filter: blur(4px);
    }

    /* Input hacker */
    .hack-input {
      background: black;
      border: 1px solid #00ff9faa;
      color: #00ff9f;
    }

    .hack-input:focus {
      outline: none;
      box-shadow: 0 0 8px #00ff9f;
    }

    /* Button hacker */
    .hack-btn {
      background: #00ff9f;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .hack-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 12px #00ff9f;
    }
  </style>
</head>
<body onload="tampilkanUpdateTerakhir()">

  <!-- Background Matrix -->
  <div class="matrix" id="matrix"></div>

  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="hack-card shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-lg text-center">

      <h1 class="text-2xl font-bold glow mb-3">
        🔔 Pembagian Kelas 2025
      </h1>

      <p class="text-sm text-green-300 mb-5">
        Ketikkan <strong>NIS</strong> atau <strong>Nama Lengkap</strong> untuk mengetahui kelasmu.
      </p>

      <input id="keyword" 
             class="hack-input p-3 w-full rounded-md text-sm sm:text-base"
             placeholder="Contoh: 123 atau Giovanni Alex">

      <button onclick="cariKelas()" 
              class="hack-btn mt-4 px-4 py-3 w-full rounded-md glow">
        CARI DATA
      </button>

      <div id="hasil" class="mt-6 min-h-[48px] text-lg font-medium glow"></div>

      <p id="lastUpdate" class="text-xs text-green-400 mt-6 italic">
        ⏳ Memuat info pembaruan...
      </p>
    </div>
  </div>

  <!-- Script Matrix Effect -->
  <script>
    const matrix = document.getElementById("matrix");
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    for (let i = 0; i < 70; i++) {
      const span = document.createElement("span");
      span.textContent = chars[Math.floor(Math.random() * chars.length)];
      span.style.left = Math.random() * 100 + "vw";
      span.style.animationDuration = (3 + Math.random() * 4) + "s";
      matrix.appendChild(span);
    }
  </script>

  <!-- Script Kelas -->
  <script>
    const SHEET_ID = "1-uBCYrNkptmLbE4-Y_cNYCuvKRz07Ojj_GwxVT4wMLg";
    const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;
    const INFO_URL = `https://opensheet.elk.sh/${SHEET_ID}/Info`;

    async function cariKelas() {
      const input = document.getElementById("keyword").value.toLowerCase().trim();
      const hasil = document.getElementById("hasil");

      hasil.innerHTML = "🔍 Mencari data...";

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const siswa = data.find(row =>
          (row.NIS && row.NIS.toLowerCase() === input) ||
          (row["nama siswa"] && row["nama siswa"].toLowerCase().includes(input))
        );

        if (siswa && siswa["nama siswa"] && siswa.Kelas) {
          hasil.innerHTML = `
            <span class="text-green-300 glow">
              ✔ <strong>${siswa["nama siswa"]}</strong>, kamu masuk kelas 
              <strong>${siswa.Kelas}</strong>.
            </span>`;
        } else {
          hasil.innerHTML = `
            <span class="text-red-500 glow">
              ✖ Data tidak ditemukan!<br>
              Kamu mungkin belum daftar ulang. SEGERA DAFTAR ULANG!!!
            </span>`;
        }
      } catch (e) {
        hasil.innerHTML = `
          <span class="text-red-500 glow">
            ⚠ Gagal mengambil data. Cek internet atau spreadsheet.
          </span>`;
      }
    }

    async function tampilkanUpdateTerakhir() {
      const el = document.getElementById("lastUpdate");
      try {
        const res = await fetch(INFO_URL);
        const info = await res.json();
        const waktu = info[0]["Terakhir Update"] || "Tidak tersedia";
        el.textContent = `📅 Data terakhir diperbarui: WIB`;
      } catch (e) {
        el.textContent = `⚠ Gagal memuat info pembaruan.`;
      }
    }
  </script>
<script src="https://nani-sigma.vercel.app/assets/js/cumantampilan.js"></script>
</body>
</html>

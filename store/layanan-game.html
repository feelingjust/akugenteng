<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Takaka Store — Top Up Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0b1a;
      --bg2: #170f2a;
      --bg3: #211538;
      --accent: #b87fff;
      --accent2: #9456f0;
      --text: #f0eeff;
      --muted: #8c7aaa;
      --card-border: rgba(184,127,255,0.13);
      --disabled: rgba(255,255,255,0.25);
      --radius: 16px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SKELETON LOADER */
    #loader {
      padding: 24px 20px;
      display: block;
    }
    .skel {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 10px;
    }
    .skel-title { height: 28px; width: 55%; margin-bottom: 10px; }
    .skel-sub   { height: 16px; width: 35%; margin-bottom: 28px; }
    .skel-grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .skel-card  { height: 120px; border-radius: var(--radius); }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* MAIN CONTENT */
    #main { display: none; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0e0b1a 0%, #170f2a 60%, #1a0b2e 100%);
      padding: 32px 20px 24px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(184,127,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(184,127,255,0.12);
      border: 1px solid rgba(184,127,255,0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 14px;
    }
    .badge::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    header h1 {
      font-family: var(--font-head);
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--muted);
      font-size: 14px;
    }

    /* SEARCH */
    .search-wrap {
      padding: 0 16px 12px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 0 14px;
      gap: 10px;
    }
    .search-box svg { flex-shrink: 0; opacity: 0.4; }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 12px 0;
    }
    .search-box input::placeholder { color: var(--muted); }

    /* GAME GRID */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 16px 24px;
    }

    /* GAME CARD */
    .game-card {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--card-border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .game-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0,229,160,0.35);
    }
    .game-card.disabled {
      opacity: 0.38;
      pointer-events: none;
    }
    .game-card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .game-card-body {
      padding: 8px 8px 10px;
    }
    .game-card-name {
      font-size: 11.5px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }
    .game-card-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 9.5px;
      background: rgba(184,127,255,0.12);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .game-card-tag.soon {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    /* POPULAR BADGE ON CARD */
    .card-wrap { position: relative; }
    .hot-badge {
      position: absolute;
      top: 7px; left: 7px;
      background: #ff4444;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      z-index: 1;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer span { color: var(--accent); }

    /* RESPONSIVE */
    @media (min-width: 480px) {
      .game-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 700px) {
      header { padding: 40px 32px 32px; }
      .search-wrap { padding: 0 28px 14px; }
      .game-grid { padding-left: 28px; padding-right: 28px; }
      .game-grid { grid-template-columns: repeat(5, 1fr); gap: 16px; }
    }
    @media (min-width: 1024px) {
      body { max-width: 900px; margin: 0 auto; }
      .game-grid { grid-template-columns: repeat(6, 1fr); }
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0e0b1a;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 22px;
      border-radius: 50px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- SKELETON LOADER -->
<section id="loader">
  <div class="skel skel-title"></div>
  <div class="skel skel-sub"></div>
  <div class="skel-grid">
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
  </div>
</section>

<!-- MAIN CONTENT -->
<div id="main">

  <header>
    <div class="badge">Top Up Instan</div>
    <h1>Pilih Game <span>Favoritmu</span></h1>
    <p>Proses cepat, harga terbaik, 24 jam aktif</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" fill="none" stroke="#8c7aaa" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Cari game..." oninput="filterGames()" />
    </div>
  </div>

  <div class="game-grid" id="gameGrid"></div>

  <footer>
    &copy; 2026 <span>Takaka Store</span> — Semua transaksi aman & cepat
  </footer>
</div>

<div id="toast">Game tidak tersedia saat ini</div>

<script>
const games = [
  {
    name: "Free Fire",
    img: "https://nan.social-networking.me/store/pilih/pic/free-fire-logo.jpg",
    href: "https://sarviola.my.id/store/pilih/game-free-fire",
    tag: "Mobile",
    cat: "mobile",
    hot: true,
    active: true
  },
  {
    name: "Mobile Legend",
    img: "https://nan.social-networking.me/store/pilih/pic/mobile-legend-logo.jpg",
    href: "https://sarviola.my.id/store/pilih/game-mobile-legend",
    tag: "Mobile",
    cat: "mobile",
    hot: true,
    active: true
  },
  {
    name: "PUBG Mobile",
    img: "https://nan.social-networking.me/store/pilih/pic/pubg-mobile-logo.jpg",
    href: "https://madikapay.bukaolshop.site/kategori/pubg-mobile-226174",
    tag: "Segera",
    cat: "soon",
    hot: false,
    active: false
  },
  {
    name: "Call of Duty",
    img: "https://nan.social-networking.me/store/pilih/pic/call-of-duty-logo.jpg",
    href: "https://madikapay.bukaolshop.site/kategori/cod-232143",
    tag: "Segera",
    cat: "soon",
    hot: false,
    active: false
  },
  {
    name: "Roblox",
    img: "https://nan.social-networking.me/store/pilih/pic/roblox-logo.jpg",
    href: "https://madikapay.bukaolshop.site/kategori/roblox-214464",
    tag: "Segera",
    cat: "soon",
    hot: false,
    active: false
  }
];

let dummy;

function renderGames(list) {
  const grid = document.getElementById('gameGrid');
  if (!list.length) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#7a9ab8;padding:32px 0;font-size:14px;">Tidak ada game ditemukan</p>`;
    return;
  }
  grid.innerHTML = list.map(g => `
    <div class="card-wrap">
      ${g.hot ? '<div class="hot-badge">🔥 Laris</div>' : ''}
      <a class="game-card${g.active ? '' : ' disabled'}" href="${g.href}"${!g.active ? ' onclick="showToast(event)"' : ''}>
        <img class="game-card-img" src="${g.img}" alt="${g.name}" loading="lazy" />
        <div class="game-card-body">
          <div class="game-card-name">${g.name}</div>
          <span class="game-card-tag${g.active ? '' : ' soon'}">${g.active ? g.tag : 'Segera'}</span>
        </div>
      </a>
    </div>
  `).join('');
}

function filterGames() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = games.filter(g => !q || g.name.toLowerCase().includes(q));
  renderGames(list);
}

function showToast(e) {
  e.preventDefault();
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// Init
renderGames(games);

setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}, 1500);
</script>
<script src="https://nani-sigma.vercel.app/assets/js/cumantampilan.js"></script>
</body>
</html>

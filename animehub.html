<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nan | Anime Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;550;600;700&display=swap" rel="stylesheet">
    
    <style>
        body[data-theme="elegant-dark"] {
            --bg-color: #000000; --text-color: #e0e0e0;
            --primary-color: #cccccc; --primary-glow: rgba(204, 204, 204, 0.3); 
            --border-color: #333; --input-bg: #1a1a1a;
            --container-bg: #000000; --menu-card-bg: #0a0a0a;
            --menu-card-bg-hover: #1a1a1a; --results-bg: #0a0a0a;
            --danger-color: #ef4444; --success-color: #22c55e;
            --gray-color: #64748b;
        }
        body[data-theme="midnight-blue"] {
            --bg-color: #020617; --text-color: #e2e8f0;
            --primary-color: #38bdf8; --primary-glow: rgba(56, 189, 248, 0.3); 
            --border-color: #1e293b; --input-bg: #1e293b;
            --container-bg: #020617; --menu-card-bg: #0f172a;
            --menu-card-bg-hover: #1e293b; --results-bg: #0f172a;
            --danger-color: #ef4444; --success-color: #22c55e;
            --gray-color: #64748b;
        }
        body[data-theme="light-mode"] {
            --bg-color: #f1f5f9; --text-color: #0f172a;
            --primary-color: #0f172a; --primary-glow: rgba(15, 23, 42, 0.2); 
            --border-color: #cbd5e1; --input-bg: #ffffff;
            --container-bg: #f1f5f9; --menu-card-bg: #ffffff;
            --menu-card-bg-hover: #e2e8f0; --results-bg: #ffffff;
            --danger-color: #dc2626; --success-color: #16a34a;
            --gray-color: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            min-height: 100vh;
            overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        h3 {
             font-size: 1.5rem; color: var(--primary-color);
             padding-bottom: 5px; margin-bottom: 1.5rem;
             border-bottom: 1px solid var(--border-color);
        }
        
        button {
            padding: 0.9rem; font-size: 1rem;
            border-radius: 5px; background-color: var(--primary-color);
            color: var(--bg-color); border: 2px solid var(--primary-color);
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover:not(:disabled) {
            background-color: transparent; color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow); 
            transform: translateY(-2px);
        }
        button:disabled { background-color: #222; color: #555; border-color: #222; cursor: not-allowed; }
        button.secondary { 
            background: transparent; border: 1px solid var(--border-color); 
            color: var(--text-color); opacity: 0.7; font-weight: 500; 
        }

        .notification { text-align: center; padding: 0.8rem; margin: 1rem 0; border-radius: 5px; display: none; font-size: 0.9rem; border: 1px solid; }
        .notification.error { background-color: #3d0f0f; color: #ffa8a8; border-color: #741a1a; }
        .notification.info { background-color: #0f2a3d; color: #a8dfff; border-color: #1a5674; }
        
        #settings-toggle-btn {
            position: fixed; top: 1rem; right: 1rem; z-index: 101;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            border: 1px solid var(--border-color); color: var(--primary-color);
            width: 40px; height: 40px; border-radius: 5px;
            font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease;
        }
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 1100; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        #settings-panel.active { opacity: 1; visibility: visible; }
        .settings-box {
            background: var(--menu-card-bg); padding: 2rem; border-radius: 8px;
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%; max-width: 400px; position: relative;
        }
        .theme-switcher { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .theme-switcher button { text-transform: none; font-size: 0.9rem; padding: 0.8rem 0.5rem; font-weight: 500; }
        #close-settings-btn {
            position: absolute; top: 1rem; right: 1rem;
            width: 30px; height: 30px; padding: 0;
            font-size: 1rem; border-radius: 50%;
        }
        .menu-card {
            display: flex; align-items: center; background-color: var(--menu-card-bg);
            border: 1px solid var(--border-color); color: var(--text-color); padding: 1rem 1.5rem;
            border-radius: 8px; text-decoration: none; transition: all 0.3s ease; margin-bottom: 1rem;
        }
        .menu-card:hover {
            background-color: var(--menu-card-bg-hover);
            border-color: var(--primary-color); color: var(--primary-color);
        }
        .menu-card i { font-size: 1.2rem; color: var(--primary-color); width: 30px; text-align: center; margin-right: 1rem; }
        
        .v2-layout { display: flex; min-height: 100vh; max-height: 100vh; }
        .v2-sidebar {
            width: 260px; background-color: var(--menu-card-bg);
            border-right: 1px solid var(--border-color); padding: 1.5rem;
            flex-shrink: 0; display: flex; flex-direction: column;
            transition: width 0.3s ease; z-index: 200;
        }
        .v2-sidebar h2 {
            font-size: 1.8rem; color: var(--primary-color); margin: 0 0 1.5rem 0;
            display: flex; align-items: center; gap: 10px;
        }
        .v2-sidebar .sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; }
        .v2-sidebar .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            border-radius: 5px; text-decoration: none; color: var(--text-color);
            opacity: 0.7; font-weight: 500; transition: all 0.2s ease; cursor: pointer;
        }
        .v2-sidebar .nav-item i { width: 20px; font-size: 1.1rem; }
        .v2-sidebar .nav-item:hover { opacity: 1; color: var(--primary-color); background-color: var(--menu-card-bg-hover); }
        .v2-sidebar .nav-item.active { opacity: 1; color: var(--primary-color); background-color: var(--input-bg); font-weight: 600; }
        .v2-sidebar .footer-nav { margin-top: auto; }
        
        .v2-content-wrapper {
            flex: 1; display: flex; flex-direction: column;
            max-height: 100vh; overflow: hidden;
        }
        
        .v2-content-header {
            padding: 1.5rem 2.5rem;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }
        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
        }
        #anime-query {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem; font-size: 1rem;
            border-radius: 5px; border: 1px solid var(--border-color);
            background-color: var(--input-bg); color: var(--text-color);
            transition: all 0.3s ease;
        }
        #anime-query:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow); 
        }
        .search-icon {
            position: absolute; top: 50%; left: 1.25rem;
            transform: translateY(-50%); color: var(--gray-color);
            font-size: 1.2rem; z-index: 2;
        }
        #anime-search-btn {
            width: auto;
            padding: 0 1.5rem;
            text-transform: none;
            font-weight: 500;
        }
        
        #search-history-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            background: var(--menu-card-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 99;
            overflow: hidden;
        }
        .history-item {
            padding: 12px 20px;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover { background-color: var(--menu-card-bg-hover); color: var(--primary-color); }
        .history-item i { opacity: 0.6; }
        .history-item-remove {
            color: var(--gray-color);
            padding: 5px;
            border-radius: 50%;
        }
        .history-item-remove:hover { background-color: var(--input-bg); color: var(--danger-color); }

        .v2-content-body {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 2.5rem;
        }

        .anime-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .anime-card {
            background: var(--menu-card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
            overflow: hidden;
            cursor: pointer;
        }
        .anime-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--primary-glow);
        }
        .anime-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }
        .anime-card-content {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .anime-card-content .title {
            color: var(--primary-color);
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anime-card-content .meta {
            font-size: 0.9rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }
        
        #modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        #modal-container {
            background: var(--menu-card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #modal-backdrop.active {
            opacity: 1;
            visibility: visible;
        }
        #modal-backdrop.active #modal-container {
            transform: scale(1);
            opacity: 1;
        }
        #modal-close-btn {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            width: 35px; height: 35px; padding: 0;
            border-radius: 50%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            z-index: 10;
        }
        #modal-close-btn:hover { background: var(--danger-color); color: #fff; }
        
        #modal-content {
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }
        #modal-content .loading-text {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.7;
            padding: 3rem;
        }
        
        .modal-header { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; }
        .modal-poster img {
            width: 150px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .modal-title h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin: 0;
        }
        .modal-title .studio {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 1rem;
        }
        .modal-spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
        }
        .spec-item {
            background: var(--input-bg);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .spec-item .label { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; }
        .spec-item .value { font-size: 1.1rem; font-weight: 600; color: var(--primary-color); }
        
        .modal-section { margin-top: 1.5rem; }
        .modal-section h4 {
            font-size: 1.2rem;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 1rem;
        }
        .modal-trailer {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .modal-trailer iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .modal-synopsis {
            line-height: 1.7;
            opacity: 0.9;
        }
        .modal-links {
            display: flex; gap: 1rem; margin-top: 1rem;
        }
        .modal-links a {
            text-decoration: none;
            width: auto;
            padding: 10px 20px;
            font-weight: 500;
            text-transform: none;
        }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .v2-layout { max-height: none; }
            .v2-sidebar {
                position: fixed; left: -260px; height: 100%;
                transition: left 0.3s ease;
            }
            .v2-sidebar.open { left: 0; }
            .v2-content-wrapper { max-height: none; }
            .v2-content-header { padding: 1rem; }
            .v2-content-body { padding: 1rem; }
            #sidebar-toggle-btn {
                display: block;
                position: fixed; top: 1rem; left: 1rem; z-index: 101;
                background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
                border: 1px solid var(--border-color); color: var(--primary-color);
                width: 40px; height: 40px; border-radius: 5px;
                font-size: 1.1rem; cursor: pointer;
            }
            #settings-toggle-btn { right: 1rem; left: auto; }
            .anime-results-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .anime-card img { height: 200px; }
            #modal-container { height: 95vh; }
            #modal-content { padding: 1.5rem; }
            .modal-header { flex-direction: column; }
            .modal-poster img { width: 120px; }
            .modal-title h2 { font-size: 1.5rem; }
            #modal-close-btn { top: 1rem; right: 1rem; }
        }
        @media (min-width: 769px) {
            #sidebar-toggle-btn { display: none; }
        }
    </style>
</head>
<body data-theme="elegant-dark">

    <button id="settings-toggle-btn" title="Pengaturan">
        <i class="fas fa-swatchbook"></i>
    </button>
    
    <button id="sidebar-toggle-btn" title="Menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <div class="v2-layout">
        
        <div class="v2-sidebar" id="v2-sidebar">
            <h2><i class="fas fa-layer-group"></i> AnimeHub</h2>
            
            <nav class="sidebar-nav">
                <a class="nav-item active" id="nav-recs-btn">
                    <i class="fas fa-fire"></i>
                    <span>Rilis Terbaru</span>
                </a>
                <a class="nav-item" id="nav-search-btn">
                    <i class="fas fa-search"></i>
                    <span>Cari Anime</span>
                </a>
                </nav>
            
            <div class="footer-nav">
                <a href="animehub.html" class="menu-card">
                    <i class="fas fa-chevron-left"></i>
                    <span>Kembali ke v1</span>
                </a>
            </div>
        </div>
        
        <div class="v2-content-wrapper">
            
            <div class="v2-content-header">
                <form id="anime-form">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="anime-query" placeholder="Cari anime..." autocomplete="off">
                        <button type="submit" id="anime-search-btn">Cari</button>
                        
                        <div id="search-history-dropdown">
                            </div>
                    </div>
                </form>
            </div>
            
            <div class="v2-content-body">
                <h3 id="content-title">🔥 Rilis Terbaru</h3>
                <div id="anime-notification" class="notification"></div>
                <div id="anime-results-list" class="anime-results-grid">
                    </div>
            </div>
            
        </div>
        
    </div>
    
    <div id="modal-backdrop">
        <div id="modal-container">
            <button id="modal-close-btn"><i class="fas fa-times"></i></button>
            <div id="modal-content">
                </div>
        </div>
    </div>
    
    <div id="settings-panel">
        <div class="settings-box">
            </div>
    </div>

    <script>
        
        function showNotification(id, message, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = message;
            el.className = 'notification ' + type;
            el.style.display = 'block';
        }

        function disableButton(btn) {
            if (!btn) return;
            btn.disabled = true;
            btn.setAttribute('data-original-text', btn.innerHTML);
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        }

        function enableButton(btn, text) {
            if (!btn) return;
            btn.disabled = false;
            const originalText = btn.getAttribute('data-original-text');
            if (text) { btn.innerHTML = text; } 
            else if (originalText) { btn.innerHTML = originalText; }
            else { btn.textContent = "Button"; }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            
            (function setupSettings() {
                const settingsPanel = document.getElementById('settings-panel');
                const settingsToggleBtn = document.getElementById('settings-toggle-btn');
                const closeSettingsBtn = document.querySelector('#settings-panel #close-settings-btn');
                
                function openSettings() { settingsPanel.classList.add('active'); }
                function closeSettings() { settingsPanel.classList.remove('active'); }
                
                if (settingsToggleBtn) settingsToggleBtn.addEventListener('click', openSettings);
                if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', closeSettings);
                if (settingsPanel) settingsPanel.addEventListener('click', (e) => {
                    if (e.target === settingsPanel) { closeSettings(); }
                });
                
                const themeSwitcher = document.querySelector('.theme-switcher');
                if (themeSwitcher) themeSwitcher.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const theme = e.target.dataset.theme;
                        document.body.dataset.theme = theme;
                        localStorage.setItem('xvct-theme', theme);
                        closeSettings();
                    }
                });
                
                function loadTheme() {
                    const savedTheme = localStorage.getItem('xvct-theme');
                    if (savedTheme) { document.body.dataset.theme = savedTheme; }
                }
                loadTheme();
            })();
            
            (function setupSidebar() {
                const sidebar = document.getElementById('v2-sidebar');
                const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
                const contentWrapper = document.querySelector('.v2-content-wrapper');
                
                if (sidebarToggleBtn && sidebar) {
                    sidebarToggleBtn.addEventListener('click', () => {
                        sidebar.classList.toggle('open');
                    });
                }
                if (contentWrapper && sidebar) {
                    contentWrapper.addEventListener('click', () => {
                         sidebar.classList.remove('open');
                    });
                }
                
                const recsBtn = document.getElementById('nav-recs-btn');
                const searchBtn = document.getElementById('nav-search-btn');
                const queryInput = document.getElementById('anime-query');
                
                recsBtn.addEventListener('click', () => {
                    loadAnimeRecommendations();
                    recsBtn.classList.add('active');
                    searchBtn.classList.remove('active');
                    if (sidebar) sidebar.classList.remove('open');
                });
                
                searchBtn.addEventListener('click', () => {
                    queryInput.focus();
                    recsBtn.classList.remove('active');
                    searchBtn.classList.add('active');
                    if (sidebar) sidebar.classList.remove('open');
                });
            })();
            
            const JIKAN_API = 'https://api.jikan.moe/v4';
            const SEARCH_HISTORY_KEY = 'xvct-anime-history';
            const MAX_HISTORY = 5;

            const animeForm = document.getElementById('anime-form');
            const queryInput = document.getElementById('anime-query');
            const searchBtn = document.getElementById('anime-search-btn');
            const contentTitle = document.getElementById('content-title');
            const resultsList = document.getElementById('anime-results-list');
            const notification = document.getElementById('anime-notification');
            const historyDropdown = document.getElementById('search-history-dropdown');
            
            const modalBackdrop = document.getElementById('modal-backdrop');
            const modalContent = document.getElementById('modal-content');
            const modalCloseBtn = document.getElementById('modal-close-btn');

            
            function getSearchHistory() {
                const history = localStorage.getItem(SEARCH_HISTORY_KEY);
                return history ? JSON.parse(history) : [];
            }
            
            function saveSearchHistory(term) {
                let history = getSearchHistory();
                history = history.filter(item => item !== term);
                history.unshift(term);
                if (history.length > MAX_HISTORY) {
                    history.pop();
                }
                localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
                renderSearchHistory();
            }
            
            function removeSearchHistory(term) {
                let history = getSearchHistory();
                history = history.filter(item => item !== term);
                localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
                renderSearchHistory();
            }
            
            function renderSearchHistory() {
                const history = getSearchHistory();
                if (history.length === 0) {
                    historyDropdown.innerHTML = '<div class="history-item" style="opacity: 0.6; cursor: default;">Riwayat pencarian kosong</div>';
                    return;
                }
                historyDropdown.innerHTML = history.map(term => `
                    <div class="history-item" data-term="${term}">
                        <span><i class="fas fa-history"></i> &nbsp; ${term}</span>
                        <span class="history-item-remove" data-term="${term}"><i class="fas fa-times"></i></span>
                    </div>
                `).join('');
            }
            
            historyDropdown.addEventListener('click', (e) => {
                const removeBtn = e.target.closest('.history-item-remove');
                if (removeBtn) {
                    e.stopPropagation();
                    removeSearchHistory(removeBtn.dataset.term);
                    return;
                }
                
                const historyItem = e.target.closest('.history-item');
                if (historyItem && historyItem.dataset.term) {
                    queryInput.value = historyItem.dataset.term;
                    searchAnime();
                    historyDropdown.style.display = 'none';
                }
            });
            
            queryInput.addEventListener('focus', () => {
                renderSearchHistory();
                historyDropdown.style.display = 'block';
            });
            
            queryInput.addEventListener('blur', () => {
                setTimeout(() => {
                    historyDropdown.style.display = 'none';
                }, 200);
            });

            
            function renderAnimeCards(data) {
                notification.style.display = 'none';
                if (!data || data.length === 0) {
                    resultsList.innerHTML = '<p style="opacity: 0.7; grid-column: 1 / -1; text-align: center;">Tidak ada data ditemukan.</p>';
                    return;
                }
                
                resultsList.innerHTML = data.map(a => {
                    const title = a.title_english || a.title;
                    return `
                    <div class="anime-card" onclick="openAnimeModal(${a.mal_id})">
                        <img src="${a.images.jpg.image_url}" alt="${title}">
                        <div class="anime-card-content">
                            <div class="title" title="${title}">${title}</div>
                            <div class="meta">
                                <span>⭐ ${a.score || '-'}</span>
                                <span>${a.type}</span>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            async function loadAnimeRecommendations() {
                contentTitle.textContent = '🔥 Rilis Terbaru';
                resultsList.innerHTML = '';
                showNotification('anime-notification', 'Mengambil rilis terbaru...', 'info');
                
                try {
                    const res = await fetch(`${JIKAN_API}/seasons/now?limit=18&sfw=true`);
                    if (!res.ok) throw new Error(`API Jikan gagal merespons (Status: ${res.status})`);
                    const json = await res.json();
                    renderAnimeCards(json.data);
                } catch (e) {
                    showNotification('anime-notification', `Error: ${e.message}`, 'error');
                }
            }
            
            async function searchAnime() {
                const query = queryInput.value.trim();
                if (!query) return;
                
                saveSearchHistory(query); 
                
                contentTitle.textContent = `🔍 Hasil Pencarian: "${query}"`;
                resultsList.innerHTML = '';
                disableButton(searchBtn);
                showNotification('anime-notification', `Mencari "${query}"...`, 'info');
                
                try {
                    const res = await fetch(`${JIKAN_API}/anime?q=${encodeURIComponent(query)}&limit=18&sfw=true`);
                    if (!res.ok) throw new Error(`API Jikan gagal merespons (Status: ${res.status})`);
                    const json = await res.json();
                    renderAnimeCards(json.data);
                } catch (e) {
                    showNotification('anime-notification', `Error: ${e.message}`, 'error');
                } finally {
                    enableButton(searchBtn, 'Cari');
                }
            }
            
            animeForm.addEventListener('submit', (e) => {
                e.preventDefault();
                searchAnime();
            });
            
            
            window.openAnimeModal = async (mal_id) => {
                modalBackdrop.style.display = 'flex';
                modalContent.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-spin"></i> Memuat detail...</div>';
                
                setTimeout(() => {
                    modalBackdrop.classList.add('active');
                }, 10);
                
                try {
                    const res = await fetch(`${JIKAN_API}/anime/${mal_id}/full`);
                    if (!res.ok) throw new Error('Gagal mengambil detail anime.');
                    const json = await res.json();
                    const d = json.data;
                    
                    const studio = d.studios.map(s => s.name).join(', ') || 'N/A';
                    const trailerUrl = d.trailer.youtube_id ? `https://www.youtube.com/embed/${d.trailer.youtube_id}` : '';
                    
                    modalContent.innerHTML = `
                        <div class="modal-header">
                            <div class="modal-poster">
                                <img src="${d.images.jpg.image_url}" alt="${d.title}">
                            </div>
                            <div class="modal-title">
                                <h2>${d.title}</h2>
                                <div class="studio">${studio}</div>
                                <div class="modal-spec-grid">
                                    <div class="spec-item">
                                        <div class="label">Skor</div>
                                        <div class="value">⭐ ${d.score || '-'}</div>
                                    </div>
                                    <div class="spec-item">
                                        <div class="label">Peringkat</div>
                                        <div class="value">#${d.rank || '-'}</div>
                                    </div>
                                    <div class="spec-item">
                                        <div class="label">Episode</div>
                                        <div class="value">${d.episodes || '-'}</div>
                                    </div>
                                    <div class="spec-item">
                                        <div class="label">Status</div>
                                        <div class="value">${d.status}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        ${trailerUrl ? `
                        <div class="modal-section">
                            <h4>Trailer</h4>
                            <div class="modal-trailer">
                                <iframe src="${trailerUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="modal-section">
                            <h4>Sinopsis</h4>
                            <p class="modal-synopsis">${d.synopsis ? d.synopsis.replace(/\n/g, '<br>') : 'Tidak ada sinopsis.'}</p>
                        </div>
                        
                        <div class="modal-section">
                            <div class="modal-links">
                                <a href="${d.url}" target="_blank" rel="noopener noreferrer" class="secondary">
                                    <i class="fas fa-link"></i> Lihat di MyAnimeList
                                </a>
                            </div>
                        </div>
                    `;
                    
                } catch (e) {
                    modalContent.innerHTML = `<div class="loading-text" style="color: var(--danger-color);">${e.message}</div>`;
                }
            }
            
            function closeAnimeModal() {
                modalBackdrop.classList.remove('active');
                setTimeout(() => {
                    modalBackdrop.style.display = 'none';
                    modalContent.innerHTML = ''; 
                }, 300); 
            }
            
            modalCloseBtn.addEventListener('click', closeAnimeModal);
            modalBackdrop.addEventListener('click', (e) => {
                if (e.target === modalBackdrop) {
                    closeAnimeModal();
                }
            });
            
            loadAnimeRecommendations();
            
        });
    </script>
<script src="https://nani-sigma.vercel.app/assets/js/cumantampilan.js"></script>
</body>
</html>

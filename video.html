    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.2);
            --bg: #050506;
            --card: #111113;
            --border: #222225;
            --text-dim: #71717a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050506 80%);
            color: #fff;
            min-height: 100vh;
        }

        .top-nav {
            padding: 15px 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 6, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 20px;
            padding: 20px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 768px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }

        .video-instance {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .video-instance.playing {
            border-color: var(--primary);
            box-shadow: 0 10px 40px var(--primary-glow);
            transform: scale(1.02);
        }

        .screen-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-bottom: 15px;
            cursor: pointer;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            pointer-events: none;
            background-size: cover;
        }

        .seeker-container { margin-bottom: 12px; }
        .seeker-bar {
            width: 100%;
            -webkit-appearance: none;
            background: #222;
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }
        .seeker-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
        }

        .meta { display: flex; justify-content: space-between; align-items: center; }
        .meta h3 { font-size: 0.8rem; color: #eee; }
        .meta p { font-size: 0.75rem; color: var(--text-dim); font-family: monospace; }
    </style>

    <nav class="top-nav">

    <script>
        const allVideos = document.querySelectorAll('video');

        function togglePlay(id) {
            const target = document.getElementById(id);
            if (target.paused) {
                allVideos.forEach(v => { if(v.id !== id) v.pause(); });
                target.play();
            } else {
                target.pause();
            }
        }

        allVideos.forEach(v => {
            const id = v.id;
            const container = document.getElementById(`cont-${id}`);
            const seek = document.getElementById(`seek-${id}`);
            const timeDisplay = document.getElementById(`time-${id}`);

            const formatTime = (s) => {
                let m = Math.floor(s/60), sc = Math.floor(s%60);
                return `${m<10?'0'+m:m}:${sc<10?'0'+sc:sc}`;
            };

            v.onplay = () => container.classList.add('playing');
            v.onpause = () => container.classList.remove('playing');

            v.onloadedmetadata = () => {
                seek.max = v.duration;
                timeDisplay.innerText = `00:00 / ${formatTime(v.duration)}`;
            };

            v.ontimeupdate = () => {
                if(!seek.isDragging) seek.value = v.currentTime;
                timeDisplay.innerText = `${formatTime(v.currentTime)} / ${formatTime(v.duration)}`;
            };

            seek.oninput = () => { v.currentTime = seek.value; };
            seek.onmousedown = () => { seek.isDragging = true; };
            seek.onmouseup = () => { seek.isDragging = false; };
        });
    </script>

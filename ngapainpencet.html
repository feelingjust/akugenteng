<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngapain Pencet Ini?</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#ffd500;
overflow:hidden;
}

/* moving background */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 20%,rgba(255,213,0,.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,213,0,.1),transparent 40%);
animation:bgFloat 8s ease-in-out infinite alternate;
}

@keyframes bgFloat{
0%{transform:translateY(0px)}
100%{transform:translateY(-40px)}
}

.container{
text-align:center;
padding:30px;
width:100%;
max-width:700px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,213,0,0.04);
border:1px solid rgba(255,213,0,0.25);
border-radius:24px;
padding:60px 30px;
backdrop-filter:blur(10px);
box-shadow:0 0 60px rgba(255,213,0,0.15);
animation:fadeUp 1s ease;
}

h1{
font-size:36px;
margin-bottom:10px;
animation:flicker 2.5s infinite;
}

.sub{
opacity:.7;
font-size:18px;
margin-bottom:35px;
}

/* BRUTAL BUTTON */
.btn{
position:relative;
padding:9px 18px;
font-size:13px;
font-weight:600;
border-radius:12px;
border:none;
cursor:pointer;
color:black;
background:linear-gradient(90deg,#f00,#f00,#f00);
background-size:300% 300%;
animation:
gradientMove 3s linear infinite,
float 2s ease-in-out infinite,
pulse 1.8s ease-in-out infinite,
shake 4s infinite;
overflow:hidden;
}

/* rotating glow */
.btn::before{
content:"";
position:absolute;
inset:-2px;
border-radius:14px;
background:conic-gradient(from 0deg,transparent, #ffd500, transparent, #ffd500);
animation:rotate 3s linear infinite;
filter:blur(8px);
opac ity:.7;
z-index:-1;
}

/* shine sweep */
.btn::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.9),transparent);
animation:shine 2s infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes shine{
0%{left:-120%}
100%{left:120%}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}

@keyframes shake{
0%,100%{transform:translateX(0)}
20%{transform:translateX(-1px)}
40%{transform:translateX(1px)}
60%{transform:translateX(-1px)}
80%{transform:translateX(1px)}
}

.btn:hover{
transform:scale(1.12);
box-shadow:0 0 30px rgba(255,213,0,.8);
}

.footer{
margin-top:35px;
font-size:13px;
opacity:.3;
animation:blink 3s infinite;
}

@keyframes blink{
0%,100%{opacity:.3}
50%{opacity:.1}
}

@keyframes flicker{
0%,18%,22%,25%,53%,57%,100%{opacity:1}
20%,24%,55%{opacity:.3}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

@media(max-width:480px){
h1{font-size:26px}
}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h1>Ngapain pencet ini?</h1>
<div class="sub">balik ga</div>
<button class="btn" onclick="goBack()">Balik</button>
<div class="footer">sarviola.my.id</div>
</div>
</div>

<script>
function goBack(){
if(document.referrer){
history.back()
}else{
window.location.href="https://sarviola.my.id"
}
}
</script>
<script src="https://nani-sigma.vercel.app/assets/js/cumantampilan.js"></script>
</body>
</html>

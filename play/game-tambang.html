<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MINECRAFT ULTIMATE | DEV NAN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: #87ceeb; touch-action: none; }

  /* --- START SCREEN --- */
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(255, 255, 255, 0.05); padding: 40px;
    border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center; backdrop-filter: blur(15px);
  }
  h1 { color: #fff; font-size: 32px; margin-bottom: 10px; }
  h1 span { color: #22c55e; }
  
  #start-btn {
    background: #22c55e; color: white; border: none;
    padding: 15px 40px; border-radius: 50px; font-weight: 800;
    cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
  }

  /* --- HOTBAR --- */
  #hotbar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: none; gap: 8px; background: rgba(0,0,0,0.7);
    padding: 8px; border-radius: 12px; z-index: 1000; pointer-events: auto;
  }
  .slot {
    width: 50px; height: 50px; background: rgba(255,255,255,0.1);
    border: 2px solid #444; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; color: white;
  }
  .slot.active { border-color: #22c55e; background: rgba(34,197,94,0.3); }

  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
    border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%);
    z-index: 50; display: none; pointer-events: none;
  }

  /* MOBILE CONTROLS */
  .m-btn {
    position: absolute; z-index: 500; display: none;
    width: 70px; height: 70px; background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
    color: white; font-weight: bold; align-items: center; justify-content: center;
  }
  #m-fwd { bottom: 110px; left: 30px; }
  #m-jmp { bottom: 30px; right: 30px; background: rgba(34, 197, 94, 0.4); }

  .copy { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 3px; }

  @media (max-width: 1024px) { .m-btn { display: flex; } }
</style>
</head>
<body>

<div id="overlay">
  <div class="card">
    <h1>MINE<span>CRAFT</span></h1>
    <p style="color:#94a3b8; margin-bottom: 25px;">INFINITE WORLD BY DEV NAN</p>
    <button id="start-btn">MULAI DUNIA</button>
  </div>
</div>

<div id="hotbar">
  <div class="slot active" data-item="punch">✊</div>
  <div class="slot" data-item="grass">🌿</div>
  <div class="slot" data-item="dirt">🟫</div>
  <div class="slot" data-item="stone">🌑</div>
</div>

<div id="crosshair"></div>
<div id="m-fwd" class="m-btn">MAJU</div>
<div id="m-jmp" class="m-btn">LOMPAT</div>
<div class="copy">Copyright by Dev Nan</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, clock;
let blocks = [];
let moveForward = false;
let velocity = new THREE.Vector3();
let canJump = false;
let selectedItem = 'punch';

const inventory = { punch: null, grass: 0x76ba3f, dirt: 0x8d6e63, stone: 0x808e9b };

document.getElementById('start-btn').onclick = () => {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('hotbar').style.display = 'flex';
  document.getElementById('crosshair').style.display = 'block';
  init();
};

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);
  // Perbaikan Fog: Dibuat jauh (100) agar dataran tidak hilang tertutup kabut
  scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  // Posisi awal kamera di atas tanah
  camera.position.set(0, 5, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 0.4);
  sun.position.set(10, 20, 10);
  scene.add(sun);

  // MEMBUAT DATARAN (Grid 30x30 = 900 Blok)
  const geo = new THREE.BoxGeometry(1, 1, 1);
  for (let x = -15; x < 15; x++) {
    for (let z = -15; z < 15; z++) {
      createBlock(x, 0, z, inventory.grass);
    }
  }

  // INPUT PC
  document.addEventListener('keydown', (e) => {
    if(e.code === 'KeyW') moveForward = true;
    if(e.code === 'Space' && canJump) { velocity.y += 5; canJump = false; }
    if(['1','2','3','4'].includes(e.key)) selectSlot(parseInt(e.key)-1);
  });
  document.addEventListener('keyup', (e) => { if(e.code === 'KeyW') moveForward = false; });

  // INTERAKSI KLIK
  document.addEventListener('mousedown', (e) => {
    if(document.getElementById('overlay').style.display === 'none') {
      document.body.requestPointerLock();
      
      const ray = new THREE.Raycaster();
      ray.setFromCamera(new THREE.Vector2(0,0), camera);
      const hits = ray.intersectObjects(blocks);

      if (hits.length > 0 && hits[0].distance < 5) {
        if (selectedItem === 'punch' || e.button === 0) {
          // EFEK PUKUL/HANCUR
          scene.remove(hits[0].object);
          blocks = blocks.filter(b => b !== hits[0].object);
        } else {
          // PASANG BLOK
          const p = hits[0].object.position.clone().add(hits[0].face.normal);
          createBlock(Math.round(p.x), Math.round(p.y), Math.round(p.z), inventory[selectedItem]);
        }
      }
    }
  });

  // KAMERA LOOK (MOUSE & TOUCH)
  let lat = 0, lon = 0;
  document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === document.body) {
      lon += e.movementX * 0.15;
      lat -= e.movementY * 0.15;
      lat = Math.max(-85, Math.min(85, lat));
    }
  });

  let tX, tY;
  document.addEventListener('touchstart', (e) => { tX = e.touches[0].pageX; tY = e.touches[0].pageY; }, {passive:false});
  document.addEventListener('touchmove', (e) => {
    if(e.target.closest('#hotbar') || e.target.classList.contains('m-btn')) return;
    lon += (e.touches[0].pageX - tX) * 0.3;
    lat -= (e.touches[0].pageY - tY) * 0.3;
    lat = Math.max(-85, Math.min(85, lat));
    tX = e.touches[0].pageX; tY = e.touches[0].pageY;
  }, {passive:false});

  // MOBILE BUTTONS
  document.getElementById('m-fwd').ontouchstart = (e) => { e.preventDefault(); moveForward = true; };
  document.getElementById('m-fwd').ontouchend = () => moveForward = false;
  document.getElementById('m-jmp').ontouchstart = (e) => { e.preventDefault(); if(canJump){ velocity.y=5; canJump=false; } };

  clock = new THREE.Clock();
  animate();
}

function createBlock(x, y, z, color) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({ color: color })
  );
  mesh.position.set(x, y, z);
  
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(mesh.geometry),
    new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.1, transparent: true })
  );
  mesh.add(edge);
  scene.add(mesh);
  blocks.push(mesh);
}

function selectSlot(i) {
  const slots = document.querySelectorAll('.slot');
  slots.forEach(s => s.classList.remove('active'));
  slots[i].classList.add('active');
  selectedItem = slots[i].getAttribute('data-item');
}

document.querySelectorAll('.slot').forEach((s, i) => {
  s.onclick = () => selectSlot(i);
});

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  let phi = THREE.MathUtils.degToRad(90 - lat);
  let theta = THREE.MathUtils.degToRad(lon);
  const target = new THREE.Vector3();
  target.setFromSphericalCoords(1, phi, theta).add(camera.position);
  camera.lookAt(target);

  velocity.y -= 15 * delta; // Gravity
  if (moveForward) {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    camera.position.addScaledVector(dir, 6 * delta);
  }
  camera.position.y += velocity.y * delta;

  // COLLISION DENGAN TANAH (Tinggi mata 1.7m)
  if (camera.position.y < 1.7) {
    velocity.y = 0;
    camera.position.y = 1.7;
    canJump = true;
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if(!camera) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

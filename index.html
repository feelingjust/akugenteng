<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="https://sarviola.my.id/logo-favico.ico">
  <title>Portofolio — Sarviola Adnan</title>
  <meta name="description" content="Website Platform digital Portofolio yang di buat oleh seorang mahasiswa smk 11 maret jakarta">
  <meta name="author" content="Sarviola Adnan SMK 11 Maret Jakarta">
  <meta name="keywords" content="Sarviola Adnan Siswa SMK 11 Maret Jakarta">
  <script src="https://api.sarviola.sarviola.my.id/app.js" defer></script>
  <link rel="canonical" href="https://sarviola.my.id">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,.7);
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #e8ff47;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .progress {
      margin-top: 20px;
      height: 6px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #e8ff47;
      animation: load 3s linear forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
  <div class="spinner"></div>
  <h1>Memverifikasi Keamanan</h1>
  <p>Harap tunggu, kami sedang memastikan koneksi Anda aman...</p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>
</body>
</html>

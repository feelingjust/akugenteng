<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COSMIC BLASTER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffd60a;
    --neon-green: #39ff14;
    --dark-bg: #020409;
    --dark-mid: #050d1a;
    --panel-bg: rgba(0, 245, 255, 0.04);
    --panel-border: rgba(0, 245, 255, 0.2);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark-bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--neon-cyan);
    touch-action: none;
    user-select: none;
  }

  #game-wrapper {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #canvas-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  /* HUD Overlay */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .hud-panel {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 6px 12px;
    backdrop-filter: blur(4px);
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,245,255,0.5);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    line-height: 1;
  }

  #lives-display {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 2px;
  }

  .life-heart {
    width: 12px; height: 12px;
    background: var(--neon-pink);
    clip-path: polygon(50% 0%, 100% 35%, 100% 70%, 50% 100%, 0% 70%, 0% 35%);
    box-shadow: 0 0 6px var(--neon-pink);
  }

  .life-heart.empty {
    background: rgba(255,0,110,0.15);
    box-shadow: none;
  }

  /* Shield Bar */
  #shield-bar-container {
    position: absolute;
    bottom: 90px; left: 16px; right: 16px;
    pointer-events: none;
    z-index: 10;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .bar-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,245,255,0.5);
    width: 46px;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    border: 1px solid rgba(0,245,255,0.1);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.1s ease;
  }

  #shield-fill { background: linear-gradient(90deg, #00b4d8, #00f5ff); box-shadow: 0 0 8px #00f5ff; }
  #heat-fill   { background: linear-gradient(90deg, #ffd60a, #ff6b35); box-shadow: 0 0 8px #ff6b35; }

  /* Mobile Controls */
  #mobile-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 12px;
    pointer-events: none;
    z-index: 10;
  }

  .ctrl-btn {
    pointer-events: all;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 50%;
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.5px;
  }

  .ctrl-btn:active { background: rgba(0,245,255,0.15); transform: scale(0.93); }

  #btn-fire {
    width: 64px; height: 64px;
    border-color: rgba(255,0,110,0.5);
    color: var(--neon-pink);
    font-size: 9px;
    box-shadow: 0 0 12px rgba(255,0,110,0.3);
    flex-direction: column;
    gap: 2px;
  }

  #btn-fire .fire-icon { font-size: 22px; }

  .d-pad {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 3px;
  }

  .d-btn {
    pointer-events: all;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.08s;
  }

  .d-btn:active { background: rgba(0,245,255,0.2); }
  .d-center { border-radius: 50%; background: rgba(0,245,255,0.08); font-size: 10px; color: rgba(0,245,255,0.4); letter-spacing: 0; }

  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: rgba(2,4,9,0.92);
    backdrop-filter: blur(6px);
    text-align: center;
    padding: 24px;
  }

  .screen.hidden { display: none; }

  .screen-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.4);
    letter-spacing: 4px;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .screen-sub {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.45);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .game-btn {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    font-weight: 700;
    padding: 14px 36px;
    border: 1px solid var(--neon-cyan);
    background: rgba(0,245,255,0.06);
    color: var(--neon-cyan);
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(0,245,255,0.2), inset 0 0 12px rgba(0,245,255,0.04);
    margin-bottom: 12px;
    width: 100%;
    max-width: 280px;
  }

  .game-btn:hover, .game-btn:active {
    background: rgba(0,245,255,0.15);
    box-shadow: 0 0 24px rgba(0,245,255,0.4), inset 0 0 24px rgba(0,245,255,0.08);
    transform: scale(1.02);
  }

  .game-btn.danger {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
    background: rgba(255,0,110,0.06);
    box-shadow: 0 0 12px rgba(255,0,110,0.2);
  }

  .game-btn.danger:hover { background: rgba(255,0,110,0.15); box-shadow: 0 0 24px rgba(255,0,110,0.4); }

  .score-box {
    background: rgba(0,245,255,0.04);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 8px;
    padding: 16px 32px;
    margin-bottom: 24px;
    min-width: 200px;
  }

  .score-box .lbl { font-size: 11px; letter-spacing: 3px; color: rgba(0,245,255,0.4); text-transform: uppercase; }
  .score-box .val { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 700; color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow); }

  .how-to {
    font-size: 12px;
    line-height: 2;
    color: rgba(0,245,255,0.4);
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .wave-badge {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
    background: rgba(255,214,10,0.1);
    border: 1px solid rgba(255,214,10,0.3);
    color: var(--neon-yellow);
  }

  /* Pause icon */
  #pause-btn {
    position: absolute;
    top: 12px; right: 16px;
    z-index: 15;
    pointer-events: all;
    cursor: pointer;
    padding: 6px;
    opacity: 0.5;
    transition: opacity 0.2s;
    background: none;
    border: none;
  }

  #pause-btn:hover { opacity: 1; }
  #pause-btn svg { display: block; }

  /* Wave announce */
  #wave-announce {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 6vw, 32px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    letter-spacing: 4px;
    pointer-events: none;
    z-index: 18;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
    white-space: nowrap;
  }

  #wave-announce.show { opacity: 1; }

  /* Combo display */
  #combo-display {
    position: absolute;
    top: 80px; right: 16px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #combo-display.show { opacity: 1; }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-panel">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score-hud">0</div>
      </div>
      <div class="hud-panel" style="text-align:center;">
        <div class="hud-label">Wave</div>
        <div class="hud-value" id="wave-hud">1</div>
      </div>
      <div class="hud-panel" style="text-align:right;">
        <div class="hud-label">Lives</div>
        <div id="lives-display">
          <div class="life-heart" id="h1"></div>
          <div class="life-heart" id="h2"></div>
          <div class="life-heart" id="h3"></div>
        </div>
      </div>
    </div>

    <button id="pause-btn" title="Pause">
      <svg width="20" height="20" viewBox="0 0 20 20"><rect x="4" y="3" width="4" height="14" rx="1" fill="rgba(0,245,255,0.7)"/><rect x="12" y="3" width="4" height="14" rx="1" fill="rgba(0,245,255,0.7)"/></svg>
    </button>

    <!-- Bars -->
    <div id="shield-bar-container">
      <div class="bar-row">
        <div class="bar-label">SHIELD</div>
        <div class="bar-track"><div class="bar-fill" id="shield-fill" style="width:100%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">HEAT</div>
        <div class="bar-track"><div class="bar-fill" id="heat-fill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Wave Announce -->
    <div id="wave-announce">WAVE 1</div>
    <div id="combo-display">2x COMBO!</div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
      <div class="d-pad">
        <div></div>
        <div class="d-btn" id="d-up">▲</div>
        <div></div>
        <div class="d-btn" id="d-left">◀</div>
        <div class="d-btn d-center" id="d-center">MOVE</div>
        <div class="d-btn" id="d-right">▶</div>
        <div></div>
        <div class="d-btn" id="d-down">▼</div>
        <div></div>
      </div>
      <button id="btn-fire" class="ctrl-btn">
        <span class="fire-icon">⚡</span>
        <span>FIRE</span>
      </button>
    </div>

    <!-- Screens -->
    <div class="screen" id="screen-start">
      <div class="screen-title">COSMIC<br>BLASTER</div>
      <div class="screen-sub">Ultimate Space Combat</div>
      <div class="how-to">
        🖥️ Desktop: Arrow/WASD + Space<br>
        📱 Mobile: D-pad + Fire button<br>
        🖱️ Mouse: Move + Left click<br>
        💡 Kumpulkan power-up dan jaga shield!
      </div>
      <button class="game-btn" id="btn-start">▶ MULAI GAME</button>
    </div>

    <div class="screen hidden" id="screen-gameover">
      <div class="screen-title" style="color:var(--neon-pink);text-shadow:0 0 20px var(--neon-pink)">GAME<br>OVER</div>
      <div class="score-box">
        <div class="lbl">Skor Akhir</div>
        <div class="val" id="final-score">0</div>
      </div>
      <div class="wave-badge" id="wave-reached">Gelombang 1 Tercapai</div>
      <button class="game-btn danger" id="btn-restart">↺ MAIN LAGI</button>
    </div>

    <div class="screen hidden" id="screen-pause">
      <div class="screen-title" style="font-size:clamp(22px,6vw,36px)">PAUSED</div>
      <div class="screen-sub" style="margin-bottom:28px">Game Dijeda</div>
      <button class="game-btn" id="btn-resume">▶ LANJUTKAN</button>
      <button class="game-btn danger" id="btn-quit">✕ KELUAR</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');

// ─── Resize ───────────────────────────────────────────────────────────
function resize() {
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resize();
window.addEventListener('resize', resize);

// ─── State ────────────────────────────────────────────────────────────
let G = {};
const isMobile = /Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) || ('ontouchstart' in window);

function initGame() {
  G = {
    running: false, paused: false, over: false,
    score: 0, wave: 1, lives: 3,
    shield: 100, maxShield: 100,
    heat: 0, maxHeat: 100, overheated: false, heatTimer: 0,
    combo: 0, comboTimer: 0,
    player: null,
    bullets: [], enemies: [], particles: [], powerups: [],
    stars: [], nebula: [],
    enemyTimer: 0, enemyInterval: 90,
    waveTimer: 0, waveDuration: 1800,
    waveKills: 0, waveKillTarget: 8,
    waveAnnounceTimer: 0,
    bossActive: false, boss: null,
    frame: 0,
    mouseX: -999, mouseY: -999,
    shootCooldown: 0,
    keys: {}
  };

  // Stars
  for (let i = 0; i < 120; i++) {
    G.stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.8 + 0.2,
      alpha: Math.random() * 0.7 + 0.3
    });
  }

  // Nebula blobs
  for (let i = 0; i < 5; i++) {
    G.nebula.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 80 + 40,
      hue: Math.random() > 0.5 ? 195 : 320,
      alpha: Math.random() * 0.04 + 0.01,
      speed: Math.random() * 0.2 + 0.05
    });
  }

  G.player = createPlayer();
  G.running = true;
  updateHUD();
  announceWave();
}

function createPlayer() {
  return {
    x: canvas.width / 2,
    y: canvas.height - 120,
    w: 28, h: 34,
    speed: 4.5,
    vx: 0, vy: 0,
    invincible: 0,
    thrusterFrame: 0,
    powerup: null, powerupTimer: 0
  };
}

// ─── HUD ──────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-hud').textContent = G.score.toLocaleString();
  document.getElementById('wave-hud').textContent = G.wave;
  document.getElementById('shield-fill').style.width = (G.shield / G.maxShield * 100) + '%';
  document.getElementById('heat-fill').style.width = (G.heat / G.maxHeat * 100) + '%';
  ;[1,2,3].forEach(i => {
    const el = document.getElementById('h' + i);
    el.classList.toggle('empty', i > G.lives);
  });
}

function announceWave() {
  const el = document.getElementById('wave-announce');
  el.textContent = 'WAVE ' + G.wave;
  el.classList.add('show');
  G.waveAnnounceTimer = 120;
}

// ─── Enemy Factory ────────────────────────────────────────────────────
function spawnEnemy() {
  const types = ['grunt', 'fast', 'tank', 'zigzag'];
  const w = G.wave;
  const pool = w < 3 ? ['grunt','grunt','fast'] :
               w < 5 ? ['grunt','fast','zigzag'] :
               ['grunt','fast','tank','zigzag'];
  const type = pool[Math.floor(Math.random() * pool.length)];

  const x = Math.random() * (canvas.width - 40) + 20;
  const configs = {
    grunt:  { hp: 2,  spd: 1.2 + w*0.1, score: 10, w: 24, h: 24, color: '#ff006e' },
    fast:   { hp: 1,  spd: 2.5 + w*0.15,score: 15, w: 18, h: 20, color: '#00f5ff' },
    tank:   { hp: 6,  spd: 0.7 + w*0.08,score: 30, w: 34, h: 30, color: '#ffd60a' },
    zigzag: { hp: 2,  spd: 1.5 + w*0.1, score: 20, w: 22, h: 22, color: '#39ff14' },
  };
  const cfg = configs[type];
  return {
    x, y: -30,
    type, ...cfg,
    maxHp: cfg.hp,
    angle: 0, zigDir: 1, zigTimer: 0,
    shootTimer: Math.floor(Math.random() * 80),
    flash: 0
  };
}

function spawnBoss() {
  G.bossActive = true;
  G.boss = {
    x: canvas.width / 2, y: -60,
    w: 70, h: 50,
    hp: 30 + G.wave * 10, maxHp: 30 + G.wave * 10,
    speed: 1.5, dir: 1,
    phase: 0, phaseTimer: 0,
    shootTimer: 0, shootInterval: 40,
    score: 500 + G.wave * 100,
    flash: 0, active: true,
    y_target: 80
  };
  G.enemies = [];
  announceWave();
}

// ─── Particles ────────────────────────────────────────────────────────
function explode(x, y, color, count = 12, speed = 3) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const spd = (Math.random() * speed + 1);
    G.particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

function floatText(x, y, text, color = '#ffd60a') {
  G.particles.push({ type: 'text', x, y, text, color, vy: -1.2, life: 1, decay: 0.025 });
}

// ─── Bullet ───────────────────────────────────────────────────────────
function firePlayerBullet() {
  if (G.shootCooldown > 0 || G.overheated) return;
  const spread = G.player.powerup === 'triple' ? [-12, 0, 12] : [0];
  spread.forEach(dx => {
    G.bullets.push({
      x: G.player.x + dx, y: G.player.y - 20,
      vx: dx * 0.08, vy: -10,
      w: 4, h: 12, color: '#00f5ff', owner: 'player',
      power: G.player.powerup === 'power' ? 2 : 1
    });
  });
  G.heat = Math.min(G.maxHeat, G.heat + (G.player.powerup === 'triple' ? 8 : 5));
  G.shootCooldown = G.player.powerup === 'rapid' ? 4 : 9;
}

function fireEnemyBullet(e) {
  const dx = G.player.x - e.x;
  const dy = G.player.y - e.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  G.bullets.push({
    x: e.x, y: e.y + e.h/2,
    vx: (dx/dist) * 3.5, vy: (dy/dist) * 3.5,
    w: 5, h: 5, color: '#ff006e', owner: 'enemy'
  });
}

function fireBossBullet() {
  const b = G.boss;
  // Ring shot
  const count = 6 + G.wave;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + b.phaseTimer * 0.01;
    G.bullets.push({
      x: b.x, y: b.y + b.h/2,
      vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3 + 1,
      w: 6, h: 6, color: '#ffd60a', owner: 'enemy'
    });
  }
}

// ─── Powerup ──────────────────────────────────────────────────────────
function spawnPowerup(x, y) {
  if (Math.random() > 0.3) return;
  const types = ['shield', 'rapid', 'triple', 'power', 'nuke'];
  const colors = { shield:'#00f5ff', rapid:'#39ff14', triple:'#ffd60a', power:'#ff006e', nuke:'#ff6b35' };
  const type = types[Math.floor(Math.random() * types.length)];
  G.powerups.push({ x, y, type, color: colors[type], vy: 1.5, r: 12, pulse: 0, life: 400 });
}

// ─── Collision ────────────────────────────────────────────────────────
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

function circleHit(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return dx*dx + dy*dy < (ar+br)*(ar+br);
}

// ─── Update ───────────────────────────────────────────────────────────
function update() {
  if (!G.running || G.paused || G.over) return;
  G.frame++;

  const W = canvas.width, H = canvas.height;
  const p = G.player;

  // ── Player movement ──
  let mx = 0, my = 0;
  if (G.keys['ArrowLeft'] || G.keys['a'] || G.keys['A'] || G.dLeft)  mx -= 1;
  if (G.keys['ArrowRight']|| G.keys['d'] || G.keys['D'] || G.dRight) mx += 1;
  if (G.keys['ArrowUp']   || G.keys['w'] || G.keys['W'] || G.dUp)    my -= 1;
  if (G.keys['ArrowDown'] || G.keys['s'] || G.keys['S'] || G.dDown)  my += 1;

  // Mouse/touch aim
  if (G.mouseX > 0 && G.mouseY > 0 && !isMobile) {
    const ddx = G.mouseX - p.x;
    const ddy = G.mouseY - p.y;
    const dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if (dist > 5) {
      mx = ddx / dist;
      my = ddy / dist;
    }
  }

  p.vx = mx * p.speed;
  p.vy = my * p.speed;
  p.x = Math.max(p.w/2, Math.min(W - p.w/2, p.x + p.vx));
  p.y = Math.max(p.h/2 + 60, Math.min(H - 100, p.y + p.vy));

  // Thruster animation
  p.thrusterFrame = (p.thrusterFrame + 0.2) % (Math.PI * 2);

  // ── Shoot ──
  if (G.shootCooldown > 0) G.shootCooldown--;
  if (G.keys[' '] || G.keys['z'] || G.firing) firePlayerBullet();

  // ── Overheat ──
  if (G.overheated) {
    G.heatTimer--;
    if (G.heatTimer <= 0) G.overheated = false;
  } else {
    if (G.heat >= G.maxHeat) { G.overheated = true; G.heatTimer = 120; }
    G.heat = Math.max(0, G.heat - 0.4);
  }

  // ── Invincibility ──
  if (p.invincible > 0) p.invincible--;
  if (p.powerupTimer > 0) {
    p.powerupTimer--;
    if (p.powerupTimer <= 0) p.powerup = null;
  }

  // ── Combo ──
  if (G.comboTimer > 0) {
    G.comboTimer--;
    if (G.comboTimer <= 0) {
      G.combo = 0;
      document.getElementById('combo-display').classList.remove('show');
    }
  }

  // ── Stars ──
  G.stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  G.nebula.forEach(n => {
    n.y += n.speed;
    if (n.y - n.r > H) { n.y = -n.r; n.x = Math.random() * W; }
  });

  // ── Bullets ──
  G.bullets = G.bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20;
  });

  // ── Wave logic ──
  if (!G.bossActive) {
    G.waveTimer++;
    G.enemyTimer++;
    const interval = Math.max(30, G.enemyInterval - G.wave * 5);
    if (G.enemyTimer >= interval) {
      G.enemyTimer = 0;
      if (G.enemies.length < 12 + G.wave) G.enemies.push(spawnEnemy());
    }

    // Boss every 4 waves
    if (G.waveKills >= G.waveKillTarget && G.wave % 4 === 0) {
      spawnBoss();
    } else if (G.waveKills >= G.waveKillTarget) {
      G.wave++;
      G.waveKills = 0;
      G.waveKillTarget = Math.min(20, 8 + G.wave * 2);
      announceWave();
    }
  }

  if (G.waveAnnounceTimer > 0) {
    G.waveAnnounceTimer--;
    if (G.waveAnnounceTimer <= 0) {
      document.getElementById('wave-announce').classList.remove('show');
    }
  }

  // ── Enemies ──
  G.enemies = G.enemies.filter(e => {
    e.y += e.spd;
    e.angle += 0.04;
    e.flash = Math.max(0, e.flash - 1);

    if (e.type === 'zigzag') {
      e.zigTimer++;
      if (e.zigTimer > 30) { e.zigDir *= -1; e.zigTimer = 0; }
      e.x += e.zigDir * 2.5;
      e.x = Math.max(e.w/2, Math.min(W - e.w/2, e.x));
    }

    // Enemy shoot
    e.shootTimer++;
    const shootRate = Math.max(60, 120 - G.wave * 5);
    if (e.shootTimer >= shootRate && Math.random() < 0.6) {
      e.shootTimer = 0;
      fireEnemyBullet(e);
    }

    // Player-enemy collision
    if (rectHit(p.x, p.y, p.w, p.h, e.x, e.y, e.w, e.h) && p.invincible === 0) {
      takeDamage(20);
      explode(e.x, e.y, e.color, 10);
      return false;
    }

    // Bullet hits enemy
    let alive = true;
    G.bullets = G.bullets.filter(b => {
      if (!alive || b.owner !== 'player') return true;
      if (rectHit(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp -= b.power || 1;
        e.flash = 6;
        if (e.hp <= 0) {
          alive = false;
          onEnemyKill(e);
          return false;
        }
        return false;
      }
      return true;
    });

    return alive && e.y < H + 40;
  });

  // ── Boss ──
  if (G.bossActive && G.boss) {
    const b = G.boss;
    b.flash = Math.max(0, b.flash - 1);

    // Move to target
    if (b.y < b.y_target) b.y += 1.5;
    else {
      b.x += b.speed * b.dir;
      if (b.x > W - b.w/2 - 20 || b.x < b.w/2 + 20) b.dir *= -1;
    }

    b.phaseTimer++;
    b.shootTimer++;
    if (b.shootTimer >= b.shootInterval) {
      b.shootTimer = 0;
      fireBossBullet();
      if (b.hp < b.maxHp * 0.5) { // Phase 2: also aimed shot
        fireEnemyBullet({ x: b.x, y: b.y, h: b.h });
      }
    }

    // Bullets hit boss
    G.bullets = G.bullets.filter(bull => {
      if (bull.owner !== 'player') return true;
      if (rectHit(bull.x, bull.y, bull.w, bull.h, b.x, b.y, b.w, b.h)) {
        b.hp -= bull.power || 1;
        b.flash = 5;
        explode(bull.x, bull.y, '#fff', 3, 2);
        if (b.hp <= 0) {
          onBossKill(b);
          return false;
        }
        return false;
      }
      return true;
    });

    // Player collision with boss
    if (rectHit(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h) && p.invincible === 0) {
      takeDamage(30);
    }
  }

  // ── Enemy bullets hit player ──
  if (p.invincible === 0) {
    G.bullets = G.bullets.filter(b => {
      if (b.owner !== 'enemy') return true;
      if (circleHit(p.x, p.y, p.w/2, b.x, b.y, b.w/2)) {
        takeDamage(10);
        explode(b.x, b.y, '#ff006e', 5, 2);
        return false;
      }
      return true;
    });
  }

  // ── Powerups ──
  G.powerups = G.powerups.filter(pu => {
    pu.y += pu.vy;
    pu.pulse = (pu.pulse + 0.08) % (Math.PI * 2);
    pu.life--;
    if (circleHit(p.x, p.y, p.w/2 + 10, pu.x, pu.y, pu.r)) {
      collectPowerup(pu);
      return false;
    }
    return pu.y < H + 20 && pu.life > 0;
  });

  // ── Particles ──
  G.particles = G.particles.filter(pt => {
    if (pt.type === 'text') {
      pt.y += pt.vy; pt.life -= pt.decay;
    } else {
      pt.x += pt.vx; pt.y += pt.vy;
      pt.vx *= 0.95; pt.vy *= 0.95;
      pt.life -= pt.decay;
    }
    return pt.life > 0;
  });

  updateHUD();
}

function takeDamage(amount) {
  G.combo = 0;
  G.comboTimer = 0;
  document.getElementById('combo-display').classList.remove('show');

  if (G.shield > 0) {
    G.shield = Math.max(0, G.shield - amount);
  } else {
    G.lives--;
    G.shield = G.maxShield;
    G.player.invincible = 150;
    explode(G.player.x, G.player.y, '#00f5ff', 20, 4);
    if (G.lives <= 0) endGame();
  }
  updateHUD();
}

function onEnemyKill(e) {
  G.combo++;
  G.comboTimer = 90;
  G.waveKills++;
  const mult = G.combo >= 5 ? 3 : G.combo >= 3 ? 2 : 1;
  const pts = e.score * mult * G.wave;
  G.score += pts;
  floatText(e.x, e.y, '+' + pts, G.combo >= 3 ? '#ffd60a' : '#fff');
  if (G.combo >= 3) {
    document.getElementById('combo-display').textContent = G.combo + 'x COMBO!';
    document.getElementById('combo-display').classList.add('show');
  }
  explode(e.x, e.y, e.color, 12 + e.maxHp * 2, 3);
  spawnPowerup(e.x, e.y);
}

function onBossKill(b) {
  G.bossActive = false;
  G.boss = null;
  G.score += b.score;
  G.wave++;
  G.waveKills = 0;
  G.waveKillTarget = Math.min(20, 8 + G.wave * 2);
  explode(b.x, b.y, '#ffd60a', 40, 6);
  explode(b.x, b.y, '#ff006e', 30, 4);
  floatText(b.x, b.y - 30, 'BOSS DOWN! +' + b.score, '#ffd60a');
  setTimeout(announceWave, 500);
}

function collectPowerup(pu) {
  floatText(pu.x, pu.y, pu.type.toUpperCase() + '!', pu.color);
  switch(pu.type) {
    case 'shield': G.shield = G.maxShield; break;
    case 'nuke':
      G.enemies.forEach(e => { explode(e.x, e.y, e.color, 8); G.score += e.score; G.waveKills++; });
      if (G.bossActive && G.boss) G.boss.hp -= 15;
      G.enemies = [];
      break;
    default:
      G.player.powerup = pu.type;
      G.player.powerupTimer = 360;
  }
}

function endGame() {
  G.over = true; G.running = false;
  document.getElementById('final-score').textContent = G.score.toLocaleString();
  document.getElementById('wave-reached').textContent = 'Gelombang ' + G.wave + ' Tercapai';
  document.getElementById('screen-gameover').classList.remove('hidden');
}

// ─── Draw ─────────────────────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#020409';
  ctx.fillRect(0, 0, W, H);

  // Nebula
  G.nebula.forEach(n => {
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, `hsla(${n.hue},100%,60%,${n.alpha})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
  });

  // Stars
  G.stars.forEach(s => {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (!G.running && G.over) return;
  if (!G.running) return;

  // Particles
  G.particles.forEach(pt => {
    if (pt.type === 'text') {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.font = 'bold 13px Rajdhani, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(pt.text, pt.x, pt.y);
    } else {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Powerups
  G.powerups.forEach(pu => {
    const pulsR = pu.r + Math.sin(pu.pulse) * 3;
    ctx.globalAlpha = 0.3 + Math.abs(Math.sin(pu.pulse)) * 0.2;
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pulsR + 5, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = pu.color + '33';
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pulsR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '11px Rajdhani';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = { shield:'🛡', rapid:'⚡', triple:'◈', power:'★', nuke:'💥' };
    ctx.fillText(icons[pu.type] || '?', pu.x, pu.y);
    ctx.textBaseline = 'alphabetic';
  });

  // Enemy bullets
  G.bullets.filter(b => b.owner === 'enemy').forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Player bullets
  G.bullets.filter(b => b.owner === 'player').forEach(b => {
    ctx.fillStyle = '#00f5ff';
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 10;
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // Enemies
  G.enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.flash > 0) { ctx.fillStyle = '#fff'; }
    else { ctx.fillStyle = e.color; }
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 12;

    const hw = e.w/2, hh = e.h/2;
    if (e.type === 'grunt') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(0, -hh); ctx.lineTo(hw, 0); ctx.lineTo(0, hh); ctx.lineTo(-hw, 0);
      ctx.closePath(); ctx.fill();
      // Inner
      ctx.shadowBlur = 0;
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#fff3';
      ctx.beginPath();
      ctx.moveTo(0, -hh*0.4); ctx.lineTo(hw*0.4, 0); ctx.lineTo(0, hh*0.4); ctx.lineTo(-hw*0.4, 0);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'fast') {
      // Arrow
      ctx.beginPath();
      ctx.moveTo(0, -hh); ctx.lineTo(hw, hh); ctx.lineTo(0, hh*0.4); ctx.lineTo(-hw, hh);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'tank') {
      // Hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI/3)*i - Math.PI/2;
        i === 0 ? ctx.moveTo(Math.cos(a)*hw, Math.sin(a)*hh) : ctx.lineTo(Math.cos(a)*hw, Math.sin(a)*hh);
      }
      ctx.closePath(); ctx.fill();
      // HP bar
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0003';
      ctx.fillRect(-hw, hh+3, e.w, 4);
      ctx.fillStyle = '#39ff14';
      ctx.fillRect(-hw, hh+3, e.w * (e.hp/e.maxHp), 4);
    } else {
      // Circle
      ctx.beginPath(); ctx.arc(0, 0, hw, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff3';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, hw*0.55, 0, Math.PI*2); ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // Boss
  if (G.bossActive && G.boss) {
    const b = G.boss;
    ctx.save();
    ctx.translate(b.x, b.y);

    const flash = b.flash > 0;
    ctx.fillStyle = flash ? '#fff' : '#ffd60a';
    ctx.strokeStyle = flash ? '#fff' : '#ff6b35';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd60a';
    ctx.shadowBlur = 25;

    // Boss body
    ctx.beginPath();
    ctx.moveTo(0, -b.h/2);
    ctx.lineTo(b.w/2, -b.h*0.1);
    ctx.lineTo(b.w/2, b.h/2);
    ctx.lineTo(-b.w/2, b.h/2);
    ctx.lineTo(-b.w/2, -b.h*0.1);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Wings
    ctx.shadowBlur = 15;
    ctx.fillStyle = flash ? '#fff' : '#ff6b35';
    ctx.beginPath();
    ctx.moveTo(-b.w/2, 0);
    ctx.lineTo(-b.w/2 - 20, b.h*0.3);
    ctx.lineTo(-b.w/2 - 10, b.h/2);
    ctx.lineTo(-b.w/2, b.h/4);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(b.w/2, 0);
    ctx.lineTo(b.w/2 + 20, b.h*0.3);
    ctx.lineTo(b.w/2 + 10, b.h/2);
    ctx.lineTo(b.w/2, b.h/4);
    ctx.closePath(); ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();

    // Boss HP bar
    const bx = b.x - b.w/2 - 20, by = b.y + b.h/2 + 8;
    const bw = b.w + 40;
    ctx.fillStyle = '#0006';
    ctx.fillRect(bx, by, bw, 6);
    const hpFrac = b.hp / b.maxHp;
    ctx.fillStyle = hpFrac > 0.5 ? '#ffd60a' : hpFrac > 0.25 ? '#ff6b35' : '#ff006e';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 6;
    ctx.fillRect(bx, by, bw * hpFrac, 6);
    ctx.shadowBlur = 0;
  }

  // Player
  const p = G.player;
  if (p.invincible % 8 < 4 || p.invincible === 0) {
    ctx.save();
    ctx.translate(p.x, p.y);

    const pup = p.powerup;
    const bodyColor = pup === 'power' ? '#ff006e' : pup === 'triple' ? '#ffd60a' : '#00f5ff';

    // Thruster flame
    const flameH = 8 + Math.abs(Math.sin(p.thrusterFrame)) * 8;
    const flameGrad = ctx.createLinearGradient(0, p.h/2, 0, p.h/2 + flameH + 4);
    flameGrad.addColorStop(0, '#ff6b35');
    flameGrad.addColorStop(0.5, '#ffd60a88');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(-7, p.h/2); ctx.lineTo(7, p.h/2); ctx.lineTo(0, p.h/2 + flameH + 4); ctx.closePath();
    ctx.fill();

    // Ship body
    ctx.fillStyle = bodyColor;
    ctx.shadowColor = bodyColor;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(0, -p.h/2);
    ctx.lineTo(p.w/2, p.h/2);
    ctx.lineTo(0, p.h*0.3);
    ctx.lineTo(-p.w/2, p.h/2);
    ctx.closePath(); ctx.fill();

    // Cockpit
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff22';
    ctx.beginPath();
    ctx.ellipse(0, -p.h*0.1, 6, 10, 0, 0, Math.PI*2); ctx.fill();

    // Wings
    ctx.fillStyle = bodyColor + 'aa';
    ctx.beginPath();
    ctx.moveTo(-p.w/2, p.h/2);
    ctx.lineTo(-p.w/2 - 10, p.h*0.4);
    ctx.lineTo(-p.w/2 + 2, p.h*0.1);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(p.w/2, p.h/2);
    ctx.lineTo(p.w/2 + 10, p.h*0.4);
    ctx.lineTo(p.w/2 - 2, p.h*0.1);
    ctx.closePath(); ctx.fill();

    // Powerup aura
    if (pup) {
      ctx.globalAlpha = 0.25 + Math.sin(G.frame * 0.1) * 0.1;
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 2;
      ctx.shadowColor = bodyColor;
      ctx.shadowBlur = 15;
      ctx.beginPath(); ctx.arc(0, 0, p.w*0.9, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// ─── Loop ─────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── Input ────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  G.keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && G.running) togglePause();
});
window.addEventListener('keyup', e => { G.keys[e.key] = false; });

// Mouse controls
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  G.mouseX = (e.clientX - rect.left) * scaleX;
  G.mouseY = (e.clientY - rect.top) * scaleY;
});

canvas.addEventListener('mousedown', e => { if (e.button === 0) { G.firing = true; firePlayerBullet(); } });
canvas.addEventListener('mouseup', e => { if (e.button === 0) G.firing = false; });
canvas.addEventListener('mouseleave', () => { G.mouseX = -999; G.mouseY = -999; });

// Touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const t = e.touches[0];
  G.mouseX = (t.clientX - rect.left) * scaleX;
  G.mouseY = (t.clientY - rect.top) * scaleY;
}, {passive: false});

// D-pad
G.dLeft = false; G.dRight = false; G.dUp = false; G.dDown = false; G.firing = false;

function setupDBtn(id, press, release) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); press(); }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); release(); }, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
}

setupDBtn('d-left',  () => G.dLeft = true,  () => G.dLeft = false);
setupDBtn('d-right', () => G.dRight = true, () => G.dRight = false);
setupDBtn('d-up',    () => G.dUp = true,    () => G.dUp = false);
setupDBtn('d-down',  () => G.dDown = true,  () => G.dDown = false);

const fireBtn = document.getElementById('btn-fire');
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); G.firing = true; }, {passive:false});
fireBtn.addEventListener('touchend',   e => { e.preventDefault(); G.firing = false; }, {passive:false});
fireBtn.addEventListener('mousedown', () => G.firing = true);
fireBtn.addEventListener('mouseup',   () => G.firing = false);

// Pause
function togglePause() {
  G.paused = !G.paused;
  document.getElementById('screen-pause').classList.toggle('hidden', !G.paused);
}

document.getElementById('pause-btn').addEventListener('click', () => {
  if (G.running && !G.over) togglePause();
});

// Buttons
document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('screen-start').classList.add('hidden');
  initGame();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('screen-gameover').classList.add('hidden');
  initGame();
});

document.getElementById('btn-resume').addEventListener('click', () => {
  togglePause();
});

document.getElementById('btn-quit').addEventListener('click', () => {
  G.paused = false;
  document.getElementById('screen-pause').classList.add('hidden');
  endGame();
});

// Show/hide mobile controls
function checkMobile() {
  const mc = document.getElementById('mobile-controls');
  mc.style.display = isMobile ? 'flex' : 'none';
}
checkMobile();

// Start loop
loop();
</script>
</body>
</html>

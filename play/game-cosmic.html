<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cosmic Blaster - Sarviola Adnan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
  
  /* COSMIC BLASTER - Copyright by Dev Nan */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; touch-action: none; }
  #game-container { position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: #000; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD & DROPDOWN MENU */
  #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; }
  .stat-group { display: flex; gap: 8px; pointer-events: none; }
  .stat-box { background: rgba(0, 245, 255, 0.1); border: 1px solid rgba(0, 245, 255, 0.3); padding: 5px 10px; border-radius: 5px; backdrop-filter: blur(5px); }
  .label { font-size: 9px; color: #00f5ff; opacity: 0.7; }
  .val { font-family: 'Orbitron'; font-size: 13px; font-weight: bold; color: #00f5ff; }

  .menu-wrapper { position: relative; }
  .dots-btn {
    width: 38px; height: 38px; background: rgba(0, 245, 255, 0.15);
    border: 1px solid rgba(0, 245, 255, 0.4); color: #00f5ff;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: bold;
  }
  .dropdown-content {
    position: absolute; top: 45px; right: 0;
    background: rgba(5, 13, 26, 0.98); border: 1px solid #00f5ff;
    border-radius: 8px; min-width: 130px; display: none;
    flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
  }
  .dropdown-content.show { display: flex; }
  .menu-item {
    padding: 14px; color: white; font-family: 'Orbitron'; font-size: 11px;
    background: none; border: none; border-bottom: 1px solid rgba(0, 245, 255, 0.1);
    cursor: pointer; text-align: left; width: 100%;
  }
  .menu-item:active { background: rgba(0, 245, 255, 0.2); }

  /* UI ELEMENT */
  #diff-tag { position: absolute; top: 75px; width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 2px; z-index: 5; }
  #bars { position: absolute; bottom: 160px; left: 20px; right: 20px; pointer-events: none; }
  .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); margin-top: 4px; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; width: 100%; transition: width 0.1s; }
  #s-fill { background: #00f5ff; box-shadow: 0 0 10px #00f5ff; }
  #h-fill { background: #ffcc00; width: 0%; }

  /* CONTROLS */
  #controls { position: absolute; bottom: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 50; }
  .dpad { display: grid; grid-template-columns: repeat(3, 55px); gap: 8px; }
  .btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 245, 255, 0.2); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  #btn-fire { width: 90px; height: 90px; border-radius: 50%; background: rgba(255, 0, 110, 0.1); border: 3px solid #ff006e; color: #ff006e; font-family: 'Orbitron'; font-weight: 900; }

  /* SCREENS */
  .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(10px); }
  .hidden { display: none !important; }
  .start-btn { padding: 12px 30px; border: 2px solid #00f5ff; background: none; color: #00f5ff; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; }
</style>
</head>
<body>
  
   <!-- COSMIC Br - Copyright by Dev Nan -->
   
<div id="game-container">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="stat-group">
      <div class="stat-box"><div class="label">SCORE</div><div id="score" class="val">0</div></div>
      <div class="stat-box"><div class="label">WAVE</div><div id="wave" class="val">1</div></div>
    </div>
    <div class="menu-wrapper">
      <button class="dots-btn" id="menuBtn">⋮</button>
      <div id="dropdownMenu" class="dropdown-content">
        <button class="menu-item" id="pauseBtn">PAUSE GAME</button>
        <button class="menu-item" onclick="location.reload()">RESTART</button>
      </div>
    </div>
  </div>

  <div id="diff-tag" style="color: #00f5ff;">LEVEL: EASY</div>

  <div id="bars">
    <div class="label">SHIELD</div>
    <div class="bar-bg"><div id="s-fill" class="bar-fill"></div></div>
    <div class="label" style="margin-top:5px">HEAT</div>
    <div class="bar-bg"><div id="h-fill" class="bar-fill"></div></div>
  </div>

  <div id="controls">
    <div class="dpad">
      <div style="grid-column: 2" class="btn" id="u">▲</div>
      <div style="grid-column: 1; grid-row: 2" class="btn" id="l">◀</div>
      <div style="grid-column: 2; grid-row: 2" class="btn" id="d">▼</div>
      <div style="grid-column: 3; grid-row: 2" class="btn" id="r">▶</div>
    </div>
    <button id="btn-fire">FIRE</button>
  </div>

  <div id="start-screen" class="screen">
    <h1 style="font-family:'Orbitron'; color:#00f5ff; margin-bottom:10px; text-align: center;">COSMIC<br>BLASTER</h1>
    <p style="margin-bottom: 20px; color:#ff006e;">CREATION BY DEV NAN</p>
    <button class="start-btn" onclick="startGame()">START MISSION</button>
  </div>
  
   <!-- COSMIC Ht - Copyright by Dev Nan -->

  <div id="pause-screen" class="screen hidden">
    <h1 style="font-family:'Orbitron'; color:#00f5ff;">PAUSED</h1>
    <button class="start-btn" style="margin-top:20px" onclick="togglePause()">RESUME</button>
  </div>

  <div id="over-screen" class="screen hidden">
    <h1 style="font-family:'Orbitron'; color:#ff006e;">FAILED</h1>
    <button class="start-btn" onclick="location.reload()">RETRY</button>
  </div>
</div>

 <!-- COSMIC AW - Copyright by Dev Nan -->

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d', { alpha: false }); // Penting untuk anti-lag
  
  let gameActive = false, isPaused = false;
  let score = 0, wave = 1;
  let enemies = [], bullets = [], stars = [];
  let lastFire = 0, lastSpawn = 0;

  const player = {
    x: 0, y: 0, speed: 7, shield: 200, heat: 0, overheated: false,
    input: { u: false, d: false, l: false, r: false, f: false }
  };

  // DROPDOWN & PAUSE LOGIC
  const menuBtn = document.getElementById('menuBtn');
  const dropdownMenu = document.getElementById('dropdownMenu');
  const pauseBtn = document.getElementById('pauseBtn');

  menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('show'); };
  window.onclick = () => dropdownMenu.classList.remove('show');

  function togglePause() {
    if(!gameActive) return;
    isPaused = !isPaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !isPaused);
    dropdownMenu.classList.remove('show');
    pauseBtn.innerText = isPaused ? "RESUME" : "PAUSE GAME";
  }
  pauseBtn.onclick = togglePause;

  function init() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    player.x = canvas.width / 2;
    player.y = canvas.height - 250;
    stars = [];
    for(let i=0; i<30; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1});
  }

  function getDifficulty() {
    const tag = document.getElementById('diff-tag');
    if (wave <= 10) { tag.innerText = "LEVEL: EASY"; tag.style.color = "#00f5ff"; return { rate: 1800, speed: 2, hp: 1 }; }
    if (wave <= 30) { tag.innerText = "LEVEL: MEDIUM"; tag.style.color = "#ffff00"; return { rate: 1300, speed: 2.8, hp: 3 }; }
    if (wave <= 80) { tag.innerText = "LEVEL: HARD"; tag.style.color = "#ff8800"; return { rate: 900, speed: 3.8, hp: 5 }; }
    if (wave <= 100) { tag.innerText = "LEVEL: EXTREME"; tag.style.color = "#ff0000"; return { rate: 500, speed: 5.5, hp: 7 }; }
    tag.innerText = "LEVEL: INSANE"; tag.style.color = "#fff"; return { rate: 350, speed: 7, hp: 10 };
  }

  function update() {
    if(!gameActive || isPaused) return;

    // Movement
    if(player.input.u && player.y > 50) player.y -= player.speed;
    if(player.input.d && player.y < canvas.height - 200) player.y += player.speed;
    if(player.input.l && player.x > 20) player.x -= player.speed;
    if(player.input.r && player.x < canvas.width - 20) player.x += player.speed;

    // Shooting
    const now = Date.now();
    if(player.input.f && !player.overheated && now - lastFire > 120) {
      bullets.push({x: player.x, y: player.y - 20});
      player.heat += 4; lastFire = now;
      if(player.heat >= 100) player.overheated = true;
    }
    player.heat = Math.max(0, player.heat - 0.8);
    if(player.heat <= 0) player.overheated = false;

    // Enemy Spawning
    const config = getDifficulty();
    if(now - lastSpawn > config.rate) {
      enemies.push({ x: Math.random()*(canvas.width-40)+20, y: -50, speed: config.speed, hp: config.hp, maxHp: config.hp });
      lastSpawn = now;
    }

    // Clean Arrays (Anti-Lag)
    for(let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= 15;
      if(bullets[i].y < -20) bullets.splice(i, 1);
    }

    for(let i = enemies.length - 1; i >= 0; i--) {
      let e = enemies[i]; e.y += e.speed;
      
      // Player Collision
      if(Math.abs(e.x - player.x) < 25 && Math.abs(e.y - player.y) < 25) {
        player.shield -= 20; enemies.splice(i, 1);
        if(player.shield <= 0) gameOver();
        continue;
      }
      
      // Bullet Collision
      for(let j = bullets.length - 1; j >= 0; j--) {
        let b = bullets[j];
        if(Math.abs(e.x - b.x) < 20 && Math.abs(e.y - b.y) < 20) {
          e.hp--; bullets.splice(j, 1);
          if(e.hp <= 0) { score += 20; enemies.splice(i, 1); if(score % 200 === 0) wave++; }
        }
      }
      if(e.y > canvas.height + 50) { enemies.splice(i, 1); player.shield -= 5; if(player.shield <= 0) gameOver(); }
    }
    
    // UI Update
    document.getElementById('score').innerText = score;
    document.getElementById('wave').innerText = wave;
    document.getElementById('s-fill').style.width = player.shield + '%';
    document.getElementById('h-fill').style.width = player.heat + '%';
  }

  function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Stars
    ctx.fillStyle = "#fff";
    stars.forEach(s => { ctx.fillRect(s.x, s.y, 1.5, 1.5); if(!isPaused) s.y += s.s; if(s.y > canvas.height) s.y = 0; });

    // Player
    ctx.fillStyle = player.overheated ? "#333" : "#00f5ff";
    ctx.beginPath(); ctx.moveTo(player.x, player.y - 20); ctx.lineTo(player.x - 18, player.y + 15); ctx.lineTo(player.x + 18, player.y + 15); ctx.fill();

    // Enemies with Visual HP BAR
    enemies.forEach(e => {
      ctx.fillStyle = "#ff006e"; ctx.fillRect(e.x - 15, e.y - 15, 30, 30);
      
      // Bar Darah Visual
      ctx.fillStyle = "rgba(255, 0, 0, 0.4)"; ctx.fillRect(e.x - 15, e.y - 25, 30, 4);
      ctx.fillStyle = "#00ff00"; ctx.fillRect(e.x - 15, e.y - 25, (e.hp / e.maxHp) * 30, 4);
    });

    // Bullets
    ctx.fillStyle = "#ffcc00";
    bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 8, 4, 15));
  }

  function gameLoop() { if(gameActive) { update(); draw(); requestAnimationFrame(gameLoop); } }

  function startGame() { document.getElementById('start-screen').classList.add('hidden'); gameActive = true; init(); gameLoop(); }
  function gameOver() { gameActive = false; document.getElementById('over-screen').classList.remove('hidden'); }

  // Kontrol Sentuh iPad
  function bind(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); player.input[prop] = true; }, {passive: false});
    el.addEventListener('touchend', (e) => { e.preventDefault(); player.input[prop] = false; }, {passive: false});
  }
  ['u','d','l','r'].forEach(id => bind(id, id)); bind('btn-fire', 'f');

  init();
  window.onresize = init;
   /* COSMIC GAME - Copyright by Dev Nan */
</script>
<script src="https://nani-sigma.vercel.app/assets/js/cumantampilan.js"></script>
</body>
</html>
